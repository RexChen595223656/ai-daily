name: AI Daily Report

on:
  schedule:
    # 每天 UTC 0:00（北京时间 8:00）运行
    - cron: "7 0 * * *"
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Key length: ${#ANTHROPIC_API_KEY}"
          python3 -c "
import os, json, urllib.request
key = os.environ.get('ANTHROPIC_API_KEY', 'NOT_SET')
print(f'Python length: {len(key)}')
print(f'Bytes: {key.encode(\"utf-8\")}')
req = urllib.request.Request(
    'https://api.anthropic.com/v1/messages',
    data=b'{\"model\":\"claude-sonnet-4-20250514\",\"max_tokens\":5,\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}]}',
    headers={
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
    }
)
try:
    resp = urllib.request.urlopen(req)
    print(f'OK: {resp.read().decode()[:100]}')
except urllib.request.HTTPError as e:
    print(f'HTTP {e.code}: {e.read().decode()[:200]}')
"

      - name: Generate daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/main.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
